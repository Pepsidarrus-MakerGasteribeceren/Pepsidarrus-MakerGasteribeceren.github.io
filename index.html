<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pepsi Darrus Linkleri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #2ea043;
            margin-bottom: 15px;
            object-fit: cover;
        }
        h1 { font-size: 26px; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .links { width: 100%; max-width: 400px; }
        .link-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: 0.3s;
        }
        .link-card:hover {
            background: #334155;
            transform: translateY(-3px);
            border-color: #2ea043;
        }
        .link-card i { margin-right: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <img src="Screenshot_20260503-023347.jpg" alt="Profil" class="profile-img">
    
    <h1>Pepsi Darrus</h1>
    <p>Resmi Sosyal Medya Hesaplarım</p>

    <div class="links">
        <a href="https://www.instagram.com/pepsidarrus1?igsh=dWZ3N2Z1N3phMHoy" target="_blank" class="link-card">
            <i class="fab fa-instagram" style="color: #E1306C;"></i> Instagram'dan Takip Et
        </a>
        
        <a href="https://youtube.com/@pepsidarrus?si=kxT2GlTo0ZKhTdnv" target="_blank" class="link-card">
            <i class="fab fa-youtube" style="color: #FF0000;"></i> YouTube Kanalıma Abone Ol
        </a>

        <a href="mailto:iletisim@adresin.com" class="link-card">
            <i class="fas fa-envelope"></i> Bana Ulaşın
        </a>
    </div>

</body>
</html>
</html>
