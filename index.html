<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benim Linklerim</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid #2ea043;
            margin-bottom: 15px;
            object-fit: cover; /* Fotoğrafın yamulmasını önler */
        }
        h1 { font-size: 24px; margin-bottom: 5px; }
        p { color: #94a3b8; margin-bottom: 30px; }
        .links { width: 100%; max-width: 400px; }
        .link-card {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: 0.3s;
        }
        .link-card:hover {
            background: #334155;
            transform: translateY(-3px);
            border-color: #2ea043;
        }
        .link-card i { margin-right: 10px; font-size: 20px; }
    </style>
</head>
<body>

    <img src="Screenshot_20260503-023347.jpg" alt="Profil" class="profile-img">
    
    <h1>Pepsi Darrus</h1>
    <p>Merhaba apoya girmej isteyen vatandaş. sana iyi bir haberm var TURKCELL SHAQ DİYE 5G GÜCÜNDE!</p>

    <div class="links">
        <a href="https://instagram.com/" class="link-card">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://youtube.com/" class="link-card">
            <i class="fab fa-youtube"></i> YouTube
        </a>
        <a href="mailto:test@gmail.com" class="link-card">
            <i class="fas fa-envelope"></i> Bize Ulaşın
        </a>
    </div>

</body>
</html>
